function rc4(data, key) {{
    var s = [], j = 0, x, out = [];
    for (var i = 0; i < 256; i++) s[i] = i;
    for (i = 0; i < 256; i++) {{
        j = (j + s[i] + key.charCodeAt(i % key.length)) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;

    i = j = 0;
    for (var y = 0; y < data.length; y++) {{
        i = (i + 1) % 256;
        j = (j + s[i]) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
        out.push(String.fromCharCode(data.charCodeAt(y) ^ s[(s[i] + s[j]) % 256]));
    }}
    return out.join('');
}}
